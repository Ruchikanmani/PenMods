name: Build Zig Qt Project (Official Fix)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Install Toolchain Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zstd curl tar

    - name: Setup Custom GCC 6.5 Toolchain
      run: |
        mkdir -p ~/aarch64-toolchain
        BASE_URL="https://github.com/Redbeanw44602/aarch64-linux-gnu-gcc-6.5.0/releases/download/6.5.0"
        
        curl -L -o binutils.tar.zst "$BASE_URL/aarch64-linux-gnu-binutils-2.30-1-x86_64.pkg.tar.zst"
        curl -L -o gcc.tar.zst "$BASE_URL/aarch64-linux-gnu-gcc-6.5.0-1-x86_64.pkg.tar.zst"
        curl -L -o glibc.tar.zst "$BASE_URL/aarch64-linux-gnu-glibc-2.27-1-any.pkg.tar.zst"

        tar -I zstd -xf binutils.tar.zst -C ~/aarch64-toolchain
        tar -I zstd -xf gcc.tar.zst -C ~/aarch64-toolchain
        tar -I zstd -xf glibc.tar.zst -C ~/aarch64-toolchain
        
        # 验证 bin 目录是否存在并列出文件（用于调试）
        ls ~/aarch64-toolchain/usr/bin/aarch64-linux-gnu-gcc || echo "GCC not found!"

    - name: Download Qt Framework
      run: |
        mkdir -p aarch64-linux-qt-5.15.2
        curl -L -o qt.tar.gz "https://github.com/Redbeanw44602/aarch64-linux-qt-5.15.2/releases/download/5.15.2/aarch64-linux-qt-5.15.2.tar.gz"
        tar -xzf qt.tar.gz -C aarch64-linux-qt-5.15.2 --strip-components=1

    - name: Patch xmake.lua
      run: |
        # 修复 lame 依赖报错
        sed -i 's/add_requires("lame")/add_requires("lame", {configs = {frontend = false, nasm = false}})/g' xmake.lua

    - name: Configure xmake
      run: |
        # 重点修复：显式指定 SDK 路径和 Bin 路径
        # 同时将作者的 --cross 拆分为真正的 prefix 和可能的 target 传参
        xmake f -y -c \
          --sdk="$HOME/aarch64-toolchain/usr" \
          --bin="$HOME/aarch64-toolchain/usr/bin" \
          --cross="aarch64-linux-gnu-" \
          --qt="$(pwd)/aarch64-linux-qt-5.15.2" \
          --arch=arm64-v8a \
          --build-platform=YDP02X \
          --target-channel=dev \
          --toolchain=zig \
          -m debug \
          -vD

    - name: Build Project
      run: |
        xmake build QrcExporter || echo "QrcExporter not found, skipping..."
        xmake build -v
