name: Build Zig Qt Project (Final Fix)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Install Kernel Headers
      run: |
        sudo apt-get update
        sudo apt-get install -y linux-libc-dev-arm64-cross

    - name: Download Qt Framework
      run: |
        mkdir -p aarch64-linux-qt-5.15.2
        curl -L -o qt.tar.gz "https://github.com/Redbeanw44602/aarch64-linux-qt-5.15.2/releases/download/5.15.2/aarch64-linux-qt-5.15.2.tar.gz"
        tar -xzf qt.tar.gz -C aarch64-linux-qt-5.15.2 --strip-components=1

    - name: Create Zig Toolchain Wrappers
      run: |
        mkdir -p zig-bin
        ZIG_EXE=$(which zig)
        K_HEADERS="-I/usr/aarch64-linux-gnu/include"
        
        echo "#!/bin/bash" > zig-bin/cc
        echo "$ZIG_EXE cc -target aarch64-linux-gnu.2.27 $K_HEADERS \"\$@\"" >> zig-bin/cc
        
        echo "#!/bin/bash" > zig-bin/cxx
        echo "$ZIG_EXE c++ -target aarch64-linux-gnu.2.27 $K_HEADERS \"\$@\"" >> zig-bin/cxx
        
        echo "#!/bin/bash" > zig-bin/ar
        echo "$ZIG_EXE ar \"\$@\"" >> zig-bin/ar
        
        echo "#!/bin/bash" > zig-bin/ranlib
        echo "$ZIG_EXE ranlib \"\$@\"" >> zig-bin/ranlib
        
        chmod +x zig-bin/*

    - name: Patch xmake.lua
      run: |
        # 1. 强化正则：匹配 add_requires("lame" ...) 及其后续所有参数并替换
        # 关键：shared=false 解决 .so 找不到的问题，frontend=false 解决可执行文件链接报错
        sed -i 's/add_requires("lame"[^)]*)/add_requires("lame", {configs = {shared = false, frontend = false, nasm = false}})/g' xmake.lua
        
        # 2. 验证修改是否成功 (Debug)
        echo "---- Updated xmake.lua content ----"
        grep "add_requires(\"lame\"" xmake.lua
        
        # 3. 强制项目使用 C++17
        echo 'set_languages("c++17")' >> xmake.lua

    - name: Configure xmake
      run: |
        # 强制设置并行任务数为 1，防止 libtool 在交叉编译时链接顺序错乱
        export MAKEFLAGS="-j1"
        
        # 在命令行再次显式传递包配置 (--lame:xxx)
        # 这样即使 xmake.lua 没改对，命令行参数优先级也是最高的
        xmake f -y -c \
          --plat=linux \
          --arch=arm64-v8a \
          --cc="$(pwd)/zig-bin/cc" \
          --cxx="$(pwd)/zig-bin/cxx" \
          --ld="$(pwd)/zig-bin/cxx" \
          --ar="$(pwd)/zig-bin/ar" \
          --ranlib="$(pwd)/zig-bin/ranlib" \
          --qt="$(pwd)/aarch64-linux-qt-5.15.2" \
          --build-platform=YDP02X \
          --target-channel=dev \
          --lame:shared=false \
          --lame:frontend=false \
          --lame:nasm=false \
          -m debug \
          -vD

    - name: Build Project
      run: |
        # 编译主项目
        xmake build -y -v
