name: Build Zig Qt Project (Final Fix)

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Install Kernel Headers
      # 即使不用 GCC 6.5，Zig 有时也需要系统内核头文件来处理 errno.h 等底层调用
      run: |
        sudo apt-get update
        sudo apt-get install -y linux-libc-dev-arm64-cross

    - name: Download Qt Framework
      run: |
        mkdir -p aarch64-linux-qt-5.15.2
        curl -L -o qt.tar.gz "https://github.com/Redbeanw44602/aarch64-linux-qt-5.15.2/releases/download/5.15.2/aarch64-linux-qt-5.15.2.tar.gz"
        tar -xzf qt.tar.gz -C aarch64-linux-qt-5.15.2 --strip-components=1

    - name: Create Zig Toolchain Wrappers
      run: |
        # 创建包装脚本，强制 Zig 使用 2.27 目标并包含内核头文件
        mkdir -p zig-bin
        ZIG_EXE=$(which zig)
        # 注意：这里加入了内核头文件的搜索路径，解决之前 errno.h 丢失的问题
        K_HEADERS="-I/usr/aarch64-linux-gnu/include"
        
        echo "#!/bin/bash" > zig-bin/cc
        echo "$ZIG_EXE cc -target aarch64-linux-gnu.2.27 $K_HEADERS \"\$@\"" >> zig-bin/cc
        
        echo "#!/bin/bash" > zig-bin/cxx
        echo "$ZIG_EXE c++ -target aarch64-linux-gnu.2.27 $K_HEADERS \"\$@\"" >> zig-bin/cxx
        
        echo "#!/bin/bash" > zig-bin/ar
        echo "$ZIG_EXE ar \"\$@\"" >> zig-bin/ar
        
        echo "#!/bin/bash" > zig-bin/ranlib
        echo "$ZIG_EXE ranlib \"\$@\"" >> zig-bin/ranlib
        
        chmod +x zig-bin/*

    - name: Patch xmake.lua
      run: |
        # 1. 修复 lame 报错
        sed -i 's/add_requires("lame")/add_requires("lame", {configs = {frontend = false, nasm = false}})/g' xmake.lua
        # 2. 强制项目使用 C++17 标准以支持 string_view
        echo 'set_languages("c++17")' >> xmake.lua

    - name: Configure xmake
      run: |
        # 重点：
        # 1. 不传 --sdk 和 --cross，防止 xmake 回退到旧 GCC
        # 2. 直接把我们的 zig-bin 传给 --cc / --cxx
        # 3. 这样 spdlog 和 elfio 就能看到现代编译器的 string_view 了
        xmake f -y -c \
          --plat=linux \
          --arch=arm64-v8a \
          --cc="$(pwd)/zig-bin/cc" \
          --cxx="$(pwd)/zig-bin/cxx" \
          --ld="$(pwd)/zig-bin/cxx" \
          --ar="$(pwd)/zig-bin/ar" \
          --ranlib="$(pwd)/zig-bin/ranlib" \
          --qt="$(pwd)/aarch64-linux-qt-5.15.2" \
          --build-platform=YDP02X \
          --target-channel=dev \
          -m debug \
          -vD

    - name: Build Project
      run: |
        xmake build -v
